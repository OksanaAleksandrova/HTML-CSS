<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
        .yes {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 1px solid grey;
            border-radius: 2px;
            margin-bottom: -2px;
        }

        .yes:checked {
            background-color: #23ffb5;
            background-image: url("https://img.icons8.com/sf-black-filled/64/dog-footprint.png");
            background-size: cover;
        }
    </style>
</head>
<body>
<label>
    <input type="checkbox" class="yes"> Yes
</label>
</body>
</html>
