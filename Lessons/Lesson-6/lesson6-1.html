<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
        body p.lorem {
            color: #df1039;
        }

        p.text {
            color: blue;
        }

        p {
            color: orange;
        }

        section p.lorem {
            color: cyan;
        }

        section div p.lorem {
            color: purple;
        }

        section div.box p.lorem {
            color: #377a50;
        }

    </style>
</head>
<body>
<section>
    <div class="box">
        <p class="text lorem pink">Lorem ipsum dolor sit amet, consectetur.</p>
    </div>
</section>

</body>
</html>

<!--1000 баллов: стилизация с помощью inline-стилей (свойство style прямо в HTML-тегах).-->
<!--100 баллов: использование уникальных идентификаторов (свойство id в CSS).-->
<!--10 баллов: использование классов для стилизации элементов (свойство class в CSS).-->
<!--1 балл: стилизация без использования классов, с помощью тегов (например, стилизация по названиям HTML-тегов).-->
