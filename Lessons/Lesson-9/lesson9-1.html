<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <style>
        * {
            margin: 0;
        }

        .wrapper {
            height: 100vh;
            background-color: darkgrey;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: 1fr 2fr 1fr;
            /*gap: 30px;*/
            grid-row-gap: 30px;
        }

        .item {
            background-color: cornflowerblue;
            border: 1px solid;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .wrapper div:nth-child(5) {
            background-color: #7df4cc;
        }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="item"><p>Lorem ipsum dolor.</p></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
    <div class="item"></div>
</div>
</body>
</html>
